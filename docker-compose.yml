services:
  backend:
    tty: true
    build:
      context: .
      dockerfile: Dockerfile

    container_name: projectgame-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    command: >
      uv run uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

    depends_on:
      - postgres-db

    volumes: 
      - .:/code

  postgres-db:
    image: postgres:16

    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: